name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip build

      - name: Build Python package
        run: |
          python -m build

      - name: Build release zip
        run: |
          python scripts/build_release.py --skip-python-package

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xjgpt-release-artifacts
          path: |
            dist/*
            release/*.zip

      - name: Create GitHub Release from tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            release/*.zip
          generate_release_notes: true
          overwrite_files: true

      - name: Create initial GitHub Release from main
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          target_commitish: main
          name: XJGPT School Gateway v0.1.0
          body: |
            Initial release of XJGPT School Gateway.

            Includes:
            - ChatGPT-like XJGPT frontend
            - FastAPI gateway
            - XipuAI school web adapter
            - Model selection support
            - OpenAI-compatible chat completion request format
            - Release zip and Python package artifacts
          files: |
            dist/*
            release/*.zip
          generate_release_notes: true
          overwrite_files: true

  publish-container-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container package
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          VERSION="0.1.0"

          docker build \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.title=XJGPT School Gateway" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:$VERSION" \
            .

          docker push "$IMAGE:latest"
          docker push "$IMAGE:$VERSION"
